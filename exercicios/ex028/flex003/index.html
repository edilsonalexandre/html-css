<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box 1</title>
    <style>
        .conteiner{
            background-color: salmon;
            height: 100px;
            display: flex;
            flex-flow: column wrap
        }

        .item{
            background-color: aqua;
            border: 1px solid black;
            text-align: center;

           flex: auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">Emxemplo de blocoA</div>
        <div class="item">Emxemplo de blocoB</div>
        <div class="item">Emxemplo de blocoC</div>
        <div class="item">Emxemplo de blocoD</div>
        <div class="item">Emxemplo de blocoE</div>
        <div class="item">Emxemplo de blocoF</div>
        <div class="item">Emxemplo de blocoG</div>
    </div>
</body>
</html>
