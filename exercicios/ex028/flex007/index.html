<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box 1</title>
    <style>
        .conteiner{
            background-color: salmon;
            
            display: flex;
            flex-flow:  row wrap ;
        }

        div.item{
            background-color: aqua;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }

        div#l1{
            order: 3;
        }
        div#l2{
            order: -2;
        }

        div#l3{
            order: 3;
        }

        div#l4{
            order: 0;
        }

        div#l5{
            order: 1;
        }

        div#l6{
            order: -3;
        }

        div#l7{
            order: -4;
        }

        
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="l1">A</div>
        <div class="item" id="l2">B</div>
        <div class="item" id="l3">C</div>
        <div class="item" id="l4">D</div>
        <div class="item" id="l5">E</div>
        <div class="item" id="l6">F</div>
        <div class="item" id="l7">G</div>
    </div>
</body>
</html>
