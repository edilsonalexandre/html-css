<!DOCTYPE html>
<html lang="PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulaario</h1>
    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="isexma" checked><label for="isexma">Masculino</label> <br>
        <input type="radio" name="sexo" id="isexfe"><label for="isexfe">Femenino</label> <br>
    </fieldset>

    <fieldset>
        <legend>Esportes Favoritos</legend>

        <input type="checkbox" name="esfut" id="iesfut"><label for="iesfut">Futebol</label> <br>
        <input type="checkbox" name="basq" id="ibasq" checked><label for="ibasq">Basquet</label> <br>
        <input type="checkbox" name="vol" id="ivol"><label for="ivol">Volei</label> <br>
        <input type="checkbox" name="ten" id="iten"><label for="iten">Tenis</label> <br>
        <input type="checkbox" name="gol" id="igol"><label for="igol">Golf</label> <br>
    </fieldset>

    <p>
        <input type="submit" value="Emviar">
        <input type="reset" value="limpar">
    </p>
</body>
</html>
