<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagens dinamicas</h1>
    <p>Abra o site em varios disposetivos diferentes ou aumenta e diminue o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">

        <source media="(max-width: 1000px )" srcset="imagens/foto-m.png" type="image/png">
        
        <img src="imagens/foto-g.png" alt="imagem flexivel">
        
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos reproduzir audios em HTML5</p>
    <audio preload="metadata" autoplay controls loop >
       <source src="midia/guanacast-33.mp3" type="audio/mpag"> 
       <source src="midia/guanacast-33.ogg" type="audio/ogg">
       <source src="midia/guanacast-33.wav" type="audio/wav">
       <p>seu navegador nao cosegue reprodusir o audio <a href="midia/guanacast-33.mp3">Clique aqui para baixar o arquivo</a></p>
    </audio>

    <h1>  <b>Teste de audio </b>2 </h1>
    <p><b>Reproduzir audio </b> </p>

      <audio preload="metadata" autoplay controls loop>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.mp3" type="audioo/ogg">
        <source src="midia/guanacast-33.mp3" type="audio/wav">
      </audio> 

</body>
</html>
