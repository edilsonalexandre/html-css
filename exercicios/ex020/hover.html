<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exxenplo de hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

         
        }

        div > p { /* Texto escondindo*/
            display: none;
            
            
        }

        div:hover > p { /* Mostra o texto escondindo*/ 
            display: block;
            color: white;
            background-color: brown;
            width: 300px

        }

        div:hover{ /* Ao passar o mouse por sima de uma div, ela ficara amarela*/
            color: rgb(143, 15, 15) ;
        }
    </style>
</head>
<body>
    <h1>Exemplo de houver</h1>
    <p>Passe o mouse sobre o texto abaixa</p>
    <div>
        Pase pase o mouse aqui
        <p>TEXTO ESCONDINDO</p>

    </div>
 
    
</body>   
</html>
